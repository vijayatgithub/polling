<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Class Meetup — RSVP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f4ede3; --paper: #fbf7f1; --ink: #1a1a2e; --ink-soft: #4a4a5e;
    --rule: #d9cdb8; --terracotta: #c44536; --terracotta-deep: #9d3324; --olive: #5e6b3a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
    color: var(--ink); background: var(--cream); -webkit-font-smoothing: antialiased;
  }
  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(196,69,54,0.07) 0%, transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(94,107,58,0.07) 0%, transparent 40%);
    min-height: 100vh; display: flex; align-items: flex-start; justify-content: center;
    padding: 40px 16px 80px;
  }
  .wrapper { width: 100%; max-width: 540px; }
  .header { text-align: center; margin-bottom: 32px; }
  .eyebrow { font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--terracotta); font-weight: 600; margin-bottom: 14px; }
  h1 { font-family: 'Fraunces', serif; font-weight: 500;
    font-size: clamp(44px, 10vw, 68px); line-height: 0.95;
    letter-spacing: -0.02em; margin: 0 0 16px; }
  h1 em { font-style: italic; font-weight: 400; color: var(--terracotta); }
  .lede { font-size: 15px; line-height: 1.55; color: var(--ink-soft);
    max-width: 380px; margin: 0 auto; }
  .card { background: var(--paper); border: 1px solid var(--rule); border-radius: 4px;
    padding: 28px 24px; box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 20px 40px -20px rgba(26,26,46,0.1); }
  fieldset { border: none; padding: 0; margin: 0 0 22px; }
  fieldset:last-of-type { margin-bottom: 0; }
  label.field { display: block; margin-bottom: 22px; }
  .label-text { display: block; font-size: 12px; letter-spacing: 0.12em;
    text-transform: uppercase; font-weight: 600; color: var(--ink); margin-bottom: 8px; }
  input[type="text"], input[type="tel"], textarea {
    width: 100%; border: none; border-bottom: 1.5px solid var(--rule);
    background: transparent; font-family: inherit; font-size: 16px;
    color: var(--ink); padding: 8px 0; transition: border-color 0.2s;
    border-radius: 0; -webkit-appearance: none;
  }
  input:focus, textarea:focus { outline: none; border-bottom-color: var(--terracotta); }
  textarea { resize: vertical; min-height: 60px; font-family: inherit; }
  legend.label-text { margin-bottom: 12px; padding: 0; }
  .radio-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .radio-row label { position: relative; text-align: center; padding: 12px 8px;
    border: 1.5px solid var(--rule); border-radius: 2px; cursor: pointer;
    font-size: 14px; font-weight: 500; transition: all 0.15s; background: white; user-select: none; }
  .radio-row input[type="radio"] { position: absolute; opacity: 0; pointer-events: none; }
  .radio-row label:has(input:checked) { border-color: var(--terracotta);
    background: var(--terracotta); color: white; }
  .file-upload { border: 1.5px dashed var(--rule); border-radius: 2px;
    padding: 24px; text-align: center; cursor: pointer; transition: all 0.2s;
    background: white; position: relative; }
  .file-upload:hover { border-color: var(--terracotta); }
  .file-upload input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .file-upload-text { font-size: 14px; color: var(--ink-soft); }
  .file-upload-text strong { color: var(--terracotta); font-weight: 600; }
  .file-preview { display: none; margin-top: 12px; }
  .file-preview img { max-width: 120px; max-height: 120px;
    border-radius: 2px; border: 1px solid var(--rule); }
  button { width: 100%; background: var(--ink); color: var(--cream); border: none;
    padding: 16px; font-family: inherit; font-size: 13px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer;
    border-radius: 2px; transition: background 0.15s; margin-top: 8px; }
  button:hover:not(:disabled) { background: var(--terracotta-deep); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .status { margin-top: 16px; padding: 12px; border-radius: 2px;
    font-size: 14px; text-align: center; display: none; }
  .status.show { display: block; }
  .status.success { background: rgba(94,107,58,0.12); color: var(--olive); }
  .status.error { background: rgba(196,69,54,0.1); color: var(--terracotta-deep); }
  .status.loading { background: rgba(26,26,46,0.05); color: var(--ink-soft); }
  .footer { text-align: center; margin-top: 32px; font-size: 13px; color: var(--ink-soft); }
  .footer a { color: var(--terracotta); text-decoration: none; border-bottom: 1px solid currentColor; }
</style>
</head>
<body>
  <div class="wrapper">
    <header class="header">
      <div class="eyebrow">RSVP</div>
      <h1>Class <em>meetup</em></h1>
      <p class="lede">Let's get the gang together. Fill this in so we can plan the date, place, and count heads.</p>
    </header>
    <main class="card">
      <form id="surveyForm" novalidate>
        <label class="field">
          <span class="label-text">Your name</span>
          <input type="text" name="name" required autocomplete="name">
        </label>
        <label class="field">
          <span class="label-text">Phone</span>
          <input type="tel" name="phone" required autocomplete="tel" inputmode="tel">
        </label>
        <label class="field">
          <span class="label-text">City</span>
          <input type="text" name="city" required autocomplete="address-level2">
        </label>
        <label class="field">
          <span class="label-text">Address</span>
          <textarea name="address" required rows="2" autocomplete="street-address"></textarea>
        </label>
        <fieldset>
          <legend class="label-text">Will you join?</legend>
          <div class="radio-row">
            <label><input type="radio" name="willingness" value="Yes" required>Yes</label>
            <label><input type="radio" name="willingness" value="Maybe">Maybe</label>
            <label><input type="radio" name="willingness" value="No">No</label>
          </div>
        </fieldset>
        <fieldset>
          <legend class="label-text">Photo of you</legend>
          <div class="file-upload" id="fileBox">
            <input type="file" name="photo" id="photoInput" accept="image/*" required>
            <div class="file-upload-text" id="fileText">
              <strong>Choose a photo</strong> or take one now
            </div>
            <div class="file-preview" id="filePreview">
              <img id="previewImg" alt="">
            </div>
          </div>
        </fieldset>
        <button type="submit" id="submitBtn">Send my details</button>
        <div id="status" class="status"></div>
      </form>
    </main>
    <p class="footer">
      Curious who else is in? <a id="resultsLink" href="#" target="_blank" rel="noopener">See the live list →</a>
    </p>
  </div>
